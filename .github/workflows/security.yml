# security.yml — Security gates that run on every pull request.
#
# Scans:
#   1. Trivy filesystem — dependency and secret scan (HIGH/CRITICAL fails PR)
#   2. Trivy IaC       — Terraform config scan, replaces archived tfsec-sarif-action
#   3. Bandit          — Python SAST for common security antipatterns (HIGH fails PR)
#   4. Python tests    — Unit tests on Python 3.11 (matches production runtime)
#
# All steps upload results as SARIF to GitHub Security tab for visibility.
# The workflow never applies or modifies any infrastructure — scan only.
#
# Fixed issues:
#   - I-3: tfsec-sarif-action (archived) replaced by aquasecurity/trivy-action IaC scan
#   - I-4: Bandit steps now use continue-on-error: true so SARIF is always written;
#           the downstream "Fail on HIGH findings" step correctly gates the PR
#   - I-5: python-version changed from "3.12" to "3.11" to match production runtime

name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results
  actions: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy on repository filesystem
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          scanners: "vuln,secret,config"
          trivyignores: ".trivyignore"
          limit-severities-for-sarif: true   # Run exit-code check against HIGH,CRITICAL only (action default scans all)
          version: "v0.69.3"

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on all forks/repos
        uses: github/codeql-action/upload-sarif@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
        with:
          sarif_file: "trivy-fs.sarif"
          category: "trivy-filesystem"

  # ────────────────────────────────────────────────────────────────────────────
  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-22.04
    # Replaces the archived aquasecurity/tfsec-sarif-action (tfsec merged into Trivy).
    # Uses trivy-action with scan-type: config to scan Terraform for misconfigurations.
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Trivy IaC scan (table — visible in logs)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "infra/terraform"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"   # Don't fail here — just show findings for diagnosis
          trivyignores: ".trivyignore"
          version: "v0.69.3"   # Pinned — v0.70.0 has new checks not yet reflected in .trivyignore

      - name: Run Trivy IaC scan on Terraform
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "infra/terraform"
          format: "sarif"
          output: "trivy-iac.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          trivyignores: ".trivyignore"
          limit-severities-for-sarif: true   # Run exit-code check against HIGH,CRITICAL only
          version: "v0.69.3"

      - name: Upload Trivy IaC SARIF
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on all forks/repos
        uses: github/codeql-action/upload-sarif@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
        with:
          sarif_file: "trivy-iac.sarif"
          category: "trivy-iac"

  # ────────────────────────────────────────────────────────────────────────────
  bandit:
    name: Bandit Python SAST
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"   # Matches production runtime (distroless debian12)

      - name: Install Bandit
        run: pip install bandit[sarif]==1.7.10 --no-cache-dir

      - name: Run Bandit on app/
        id: bandit_app
        # continue-on-error so the SARIF file is always written even when Bandit
        # finds issues. The "Fail on HIGH findings" step below gates the PR.
        continue-on-error: true
        run: |
          bandit \
            -r app/src/ \
            -f sarif \
            -o bandit-app.sarif \
            --severity-level high \
            --confidence-level medium \
            -x app/tests/

      - name: Run Bandit on mcp-agent/
        id: bandit_mcp
        continue-on-error: true
        run: |
          bandit \
            -r mcp-agent/src/ \
            -f sarif \
            -o bandit-mcp.sarif \
            --severity-level high \
            --confidence-level medium \
            -x mcp-agent/tests/

      - name: Upload Bandit app SARIF
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on all forks/repos
        uses: github/codeql-action/upload-sarif@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
        with:
          sarif_file: bandit-app.sarif
          category: "bandit-app"

      - name: Upload Bandit mcp SARIF
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on all forks/repos
        uses: github/codeql-action/upload-sarif@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
        with:
          sarif_file: bandit-mcp.sarif
          category: "bandit-mcp"

      # Gate the PR on HIGH findings — runs after SARIF upload so results are
      # visible in the Security tab regardless of whether this step fails.
      - name: Fail on HIGH Bandit findings
        run: |
          FAILED=0
          for sarif in bandit-app.sarif bandit-mcp.sarif; do
            if [ -f "$sarif" ]; then
              COUNT=$(python3 -c "
          import json
          with open('$sarif') as f:
              data = json.load(f)
          high = [
              r for run in data.get('runs', [])
              for r in run.get('results', [])
              if r.get('level') == 'error'
          ]
          print(len(high))
              ")
              echo "$sarif — HIGH findings: $COUNT"
              if [ "$COUNT" -gt "0" ]; then
                echo "::error::Bandit found $COUNT HIGH severity issues in $sarif. Fix before merging."
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  # ────────────────────────────────────────────────────────────────────────────
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        suite: [app, mcp-agent]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"   # Matches production runtime (distroless debian12)

      - name: Install dependencies
        run: |
          pip install --no-cache-dir \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            pytest-mock==3.14.0 \
            -r ${{ matrix.suite }}/requirements.txt

      - name: Run tests
        working-directory: ${{ matrix.suite }}
        run: |
          pytest tests/ \
            -v \
            --asyncio-mode=auto \
            --tb=short \
            --no-header \
            -q
