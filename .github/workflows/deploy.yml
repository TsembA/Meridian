# deploy.yml — CI/CD workflow for building and deploying the FastAPI app and MCP agent.
#
# Triggers:
#   - Push to main branch touching app/, mcp-agent/, or k8s/charts/ paths
#
# Steps:
#   1. Build Docker image → push to GHCR (pinned to digest, not tag)
#   2. Trivy vulnerability scan on the pushed image
#   3. Helm upgrade on the k3s cluster via SSM port-forward tunnel
#
# Authentication:
#   - GHCR: GITHUB_TOKEN (automatic, no secrets needed)
#   - AWS: OIDC role (no static credentials)
#   - k3s API: SSM port-forward (localhost:6443 → EC2 node:6443); no SSH key needed
#
# Fixed issues:
#   - B-2: SSM port-forward tunnel now opened before helm/kubectl; kubeconfig
#     server URL stays as 127.0.0.1:6443 (no sed rewrite to unreachable private IP)
#   - M-3: Removed per-job contains(head_commit.modified, 'app/') conditions —
#     contains() does element equality on arrays, not substring match. Workflow-level
#     paths: filter handles path-based triggering correctly.
#   - M-11: SSM parameter prefix extracted to env var SSM_PREFIX

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "mcp-agent/**"
      - "k8s/charts/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-flight deploys — finish or fail cleanly

permissions:
  contents: read
  packages: write   # Push to GHCR
  id-token: write   # OIDC for AWS

env:
  SSM_PREFIX: /meridian   # SSM parameter namespace — keep in sync with Terraform var.project_name

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-app:
    name: Build & Push meridian-app
    runs-on: ubuntu-22.04

    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Lowercase image owner
        id: img
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226  # v3.0.0

      - name: Log in to GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d  # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81  # v5.5.1
        with:
          images: ghcr.io/${{ steps.img.outputs.owner }}/meridian-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push meridian-app
        id: push
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991  # v6.13.0
        with:
          context: app/
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.img.outputs.owner }}/meridian-app:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.img.outputs.owner }}/meridian-app:buildcache,mode=max
          platforms: linux/amd64

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.img.outputs.owner }}/meridian-app@${{ steps.push.outputs.digest }}
          format: "sarif"
          output: "trivy-app.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "1"   # Fail the deploy if HIGH/CRITICAL CVEs are found in the image
          ignore-unfixed: true   # Skip CVEs with no available fix — OS base image CVEs we can't patch
          limit-severities-for-sarif: true   # Lock exit-code check to HIGH,CRITICAL only (SARIF mode scans all by default)
          trivyignores: ".trivyignore"   # Suppress accepted risks (distroless OS CVEs, IaC false positives)

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true  # Code Scanning may not be enabled on all forks/repos
        uses: github/codeql-action/upload-sarif@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
        with:
          sarif_file: "trivy-app.sarif"

  # ────────────────────────────────────────────────────────────────────────────
  build-mcp:
    name: Build & Push meridian-mcp
    runs-on: ubuntu-22.04

    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Lowercase image owner
        id: img
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226  # v3.0.0

      - name: Log in to GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d  # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81  # v5.5.1
        with:
          images: ghcr.io/${{ steps.img.outputs.owner }}/meridian-mcp
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push meridian-mcp
        id: push
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991  # v6.13.0
        with:
          context: mcp-agent/
          file: mcp-agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.img.outputs.owner }}/meridian-mcp:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.img.outputs.owner }}/meridian-mcp:buildcache,mode=max
          platforms: linux/amd64

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.img.outputs.owner }}/meridian-mcp@${{ steps.push.outputs.digest }}
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true   # Skip CVEs with no available fix — OS base image CVEs we can't patch
          trivyignores: ".trivyignore"   # Suppress accepted risks (distroless OS CVEs, IaC false positives)

  # ────────────────────────────────────────────────────────────────────────────
  helm-deploy:
    name: Helm Upgrade on k3s
    runs-on: ubuntu-22.04
    needs: [build-app, build-mcp]
    # Run when at least one build succeeded; skip if both failed or both skipped.
    if: always() && (needs.build-app.result == 'success' || needs.build-mcp.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}

      - name: Lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Install Helm
        # Installing directly from the official Helm release avoids the deprecated
        # azure/setup-helm@v3 action (Node 16). Pinned version matches cloud-init.yaml.
        run: |
          HELM_VERSION="v3.16.3"
          curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo install -o root -g root -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Install AWS Session Manager plugin
        # Required for `aws ssm start-session --document-name AWS-StartPortForwardingSession`
        run: |
          curl -fsSL \
            "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/ssm-plugin.deb
          sudo dpkg -i /tmp/ssm-plugin.deb

      - name: Open SSM port-forward tunnel to k3s API server
        # Forwards runner localhost:6443 → EC2 node 127.0.0.1:6443 (k3s API server).
        # The k3s TLS cert covers 127.0.0.1 (see tls-san in cloud-init.yaml), so
        # kubectl TLS validation passes without any certificate workarounds.
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=meridian-ec2" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"

          aws ssm start-session \
            --target "$INSTANCE_ID" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["6443"],"localPortNumber":["6443"]}' &
          echo "SSM_PID=$!" >> "$GITHUB_ENV"

          # Poll until the local port is reachable (up to 30s)
          echo "Waiting for SSM tunnel on localhost:6443..."
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 6443 2>/dev/null; then
              echo "Tunnel established after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Fetch kubeconfig from EC2 via SSM run-command
        # Retrieves /root/.kube/config from the node.
        # The server URL stays as https://127.0.0.1:6443 — the SSM tunnel handles routing.
        # No sed rewrite to private IP needed (private IP is unreachable from the runner).
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cat /root/.kube/config"]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text > /tmp/kubeconfig.yaml

          echo "KUBECONFIG=/tmp/kubeconfig.yaml" >> "$GITHUB_ENV"

      # RBAC and NetworkPolicies are applied BEFORE Helm so ServiceAccounts exist
      # when Deployment pods start. On first deploy the SAs don't exist yet —
      # applying manifests first avoids "serviceaccount not found" pod errors.
      - name: Apply RBAC, NetworkPolicy, and monitoring manifests
        run: |
          kubectl apply -f k8s/manifests/rbac/
          kubectl apply -f k8s/manifests/network-policies/
          kubectl apply -k k8s/manifests/monitoring/        # Kustomize: Grafana dashboard ConfigMap
          kubectl apply -f k8s/monitoring/alerts/           # PrometheusRule CRDs (requires Prometheus Operator)

      - name: Helm upgrade nexus-app
        if: needs.build-app.result == 'success'
        run: |
          DB_PASS=$(aws ssm get-parameter \
            --name "${{ env.SSM_PREFIX }}/db/password" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)

          helm upgrade --install nexus-app k8s/charts/nexus-app \
            --namespace meridian \
            --create-namespace \
            --set "image.digest=${{ needs.build-app.outputs.image_digest }}" \
            --set "image.repository=ghcr.io/${{ env.IMAGE_OWNER }}/meridian-app" \
            --set "postgresql.auth.password=${DB_PASS}" \
            --set "ingress.hosts[0].host=${{ secrets.APP_HOSTNAME }}" \
            --atomic \
            --timeout=5m \
            --wait

      - name: Helm upgrade nexus-mcp
        if: needs.build-mcp.result == 'success'
        run: |
          helm upgrade --install nexus-mcp k8s/charts/nexus-mcp \
            --namespace meridian \
            --create-namespace \
            --set "image.digest=${{ needs.build-mcp.outputs.image_digest }}" \
            --set "image.repository=ghcr.io/${{ env.IMAGE_OWNER }}/meridian-mcp" \
            --atomic \
            --timeout=5m \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/nexus-app -n meridian --timeout=120s || true
          kubectl get pods -n meridian

      - name: Close SSM port-forward tunnel
        if: always()   # Run even if a previous step failed — clean up the background process
        run: kill "$SSM_PID" 2>/dev/null || true

  # ────────────────────────────────────────────────────────────────────────────
  # Separate job for manifest-only changes (RBAC / NetworkPolicy / monitoring)
  # that don't touch app or mcp-agent code — build jobs are skipped in that case
  # so helm-deploy never runs, but manifests still need to be applied.
  manifest-apply:
    name: Apply k8s Manifests
    runs-on: ubuntu-22.04
    needs: [build-app, build-mcp]
    # Run when BOTH builds were skipped (chart/manifest-only push) AND not when
    # helm-deploy already ran (which applies manifests as part of its flow).
    if: |
      always() &&
      needs.build-app.result == 'skipped' &&
      needs.build-mcp.result == 'skipped'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-Manifests-${{ github.run_id }}

      - name: Install AWS Session Manager plugin
        run: |
          curl -fsSL \
            "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/ssm-plugin.deb
          sudo dpkg -i /tmp/ssm-plugin.deb

      - name: Open SSM tunnel + fetch kubeconfig
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=meridian-ec2" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"

          aws ssm start-session \
            --target "$INSTANCE_ID" \
            --document-name AWS-StartPortForwardingSession \
            --parameters '{"portNumber":["6443"],"localPortNumber":["6443"]}' &
          echo "SSM_PID=$!" >> "$GITHUB_ENV"

          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 6443 2>/dev/null; then break; fi
            sleep 1
          done

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cat /root/.kube/config"]' \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text > /tmp/kubeconfig.yaml
          echo "KUBECONFIG=/tmp/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/manifests/rbac/
          kubectl apply -f k8s/manifests/network-policies/
          kubectl apply -k k8s/manifests/monitoring/        # Kustomize: Grafana dashboard ConfigMap
          kubectl apply -f k8s/monitoring/alerts/           # PrometheusRule CRDs

      - name: Close SSM tunnel
        if: always()
        run: kill "$SSM_PID" 2>/dev/null || true
