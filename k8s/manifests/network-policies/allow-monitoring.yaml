# allow-monitoring.yaml — NetworkPolicy allow rules for Prometheus scraping and Grafana access.
# Prometheus (monitoring ns) → meridian-app pods on :8000/metrics
# Grafana (monitoring ns) → inbound from NGINX ingress on :3000
# Prometheus → Alertmanager within monitoring namespace

---
# Allow Prometheus to scrape metrics from meridian-app pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-app
  namespace: meridian
  labels:
    app.kubernetes.io/component: network-security
    app.kubernetes.io/part-of: meridian-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: meridian-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000   # FastAPI /metrics endpoint (same port as app)

---
# Allow Prometheus to scrape metrics from meridian-mcp pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-mcp
  namespace: meridian
  labels:
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: meridian-mcp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080   # MCP agent metrics port

---
# Allow Prometheus egress → meridian namespace for scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape-egress
  namespace: monitoring
  labels:
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    # Scrape targets in meridian namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: meridian
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8080
    # Prometheus → Alertmanager (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
      ports:
        - protocol: TCP
          port: 9093
    # Prometheus → kube-state-metrics and node-exporter (intra-namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 8443

---
# Allow Grafana ingress from NGINX ingress controller (for browser access)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

---
# Allow Grafana egress → Prometheus data source
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-to-prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
