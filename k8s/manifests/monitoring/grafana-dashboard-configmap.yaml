# grafana-dashboard-configmap.yaml
#
# NOTE: This file is NOT applied directly with kubectl apply -f.
# It is generated by Kustomize via the kustomization.yaml in this directory.
# Apply with: kubectl apply -k k8s/manifests/monitoring/
#
# Kustomize's configMapGenerator reads the dashboard JSON from
# k8s/monitoring/dashboards/meridian-dashboard.json and inlines it
# into a ConfigMap with the grafana_dashboard: "1" label so the
# kube-prometheus-stack Grafana sidecar auto-provisions it.
#
# This file is here for documentation only. See kustomization.yaml.
