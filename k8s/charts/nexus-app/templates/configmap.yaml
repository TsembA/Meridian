# configmap.yaml — Non-secret runtime configuration for the Meridian app.
# Secrets (DB password, Redis password, secret key) are NOT stored here —
# they are fetched at pod startup from SSM Parameter Store via boto3.

apiVersion: v1
kind: ConfigMap
metadata:
  name: meridian-app-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-app.labels" . | nindent 4 }}
data:
  # AWS region for boto3 SSM client
  AWS_REGION: {{ index .Values.env "AWS_REGION" | default "us-west-1" | quote }}

  # SSM path prefix — all secrets are under this prefix
  SSM_PREFIX: {{ index .Values.env "SSM_PREFIX" | default "/meridian" | quote }}

  # Log level
  LOG_LEVEL: {{ index .Values.env "LOG_LEVEL" | default "INFO" | quote }}

  # App version — displayed in /health response
  APP_VERSION: {{ .Chart.AppVersion | quote }}
