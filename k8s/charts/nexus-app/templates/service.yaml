# service.yaml — ClusterIP Service for the Meridian FastAPI app.
# External access is via the NGINX Ingress defined in ingress.yaml.

apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "nexus-app.selectorLabels" . | nindent 4 }}
