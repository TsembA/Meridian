#cloud-config
# cloud-init.yaml — First-boot bootstrap for the Meridian k3s single-node cluster.
# Runs once automatically when the EC2 instance starts for the first time.
# Design decisions:
#   - k3s version is pinned (reproducible builds, avoids surprise upgrades)
#   - API server bound to 127.0.0.1 only (never exposed on public interface)
#   - Traefik is disabled — we deploy our own NGINX ingress with explicit config
#   - Helm repos are added so the deploy workflow can `helm upgrade --install` directly
#   - AWS CLI v2 installed for SSM parameter reads at Helm install time
#   - All commands use set -e to abort on any failure (no silent partial installs)

package_update: true
package_upgrade: true

packages:
  - curl
  - jq
  - git
  - unzip
  - ca-certificates
  - apt-transport-https   # Ubuntu compat; harmless on AL2023

# Write k3s config before installer runs so the server picks it up on first start
write_files:
  - path: /etc/rancher/k3s/config.yaml
    owner: root:root
    permissions: "0600"
    content: |
      # Bind API server to loopback only — the k8s API is never reachable externally.
      # kubectl access is via SSM session + kubeconfig on the node itself.
      bind-address: "127.0.0.1"
      advertise-address: "127.0.0.1"

      # Disable built-in ingress and LB — we control these via Helm
      disable:
        - traefik
        - servicelb

      # TLS SANs required for local kubectl without certificate errors
      tls-san:
        - "127.0.0.1"
        - "localhost"

      # Write kubeconfig for root user on install
      write-kubeconfig-mode: "0600"

      # Cluster token — k3s generates one if not set; we use a stable value so
      # node re-registration after a reboot doesn't orphan the cluster state.
      # In a multi-node setup this would be set via SSM; single-node is fine with auto.

  # Convenience script: install AWS CLI v2 (idempotent)
  - path: /usr/local/bin/install-awscli.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if command -v aws &>/dev/null; then
        echo "AWS CLI already installed: $(aws --version)"
        exit 0
      fi
      curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
      unzip -q /tmp/awscliv2.zip -d /tmp/awscli-install
      /tmp/awscli-install/aws/install
      rm -rf /tmp/awscliv2.zip /tmp/awscli-install
      echo "AWS CLI installed: $(aws --version)"

  # Convenience script: install Helm (idempotent)
  - path: /usr/local/bin/install-helm.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if command -v helm &>/dev/null; then
        echo "Helm already installed: $(helm version --short)"
        exit 0
      fi
      # Pinned version — update deliberately, not automatically
      HELM_VERSION="v3.14.0"
      curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" \
        | tar -xz -C /tmp
      install -o root -g root -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
      rm -rf /tmp/linux-amd64
      echo "Helm installed: $(helm version --short)"

runcmd:
  # ── 1. Install AWS CLI (needed by Helm install step to read SSM secrets) ──
  - /usr/local/bin/install-awscli.sh

  # ── 2. Install k3s — version pinned for reproducibility ───────────────────
  # INSTALL_K3S_SKIP_START=false means systemd unit starts immediately
  - |
    curl -sfL https://get.k3s.io \
      | INSTALL_K3S_VERSION="v1.28.5+k3s1" \
        INSTALL_K3S_EXEC="server" \
        sh -

  # ── 3. Wait for k3s to be ready (API server + CoreDNS) ───────────────────
  - |
    echo "Waiting for k3s node to become Ready..."
    for i in $(seq 1 30); do
      if k3s kubectl get nodes 2>/dev/null | grep -q "Ready"; then
        echo "k3s node is Ready"
        break
      fi
      echo "  attempt ${i}/30 — sleeping 10s"
      sleep 10
    done

  # ── 4. Copy kubeconfig so root can use kubectl directly ───────────────────
  - mkdir -p /root/.kube
  - cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
  - chmod 600 /root/.kube/config

  # ── 5. Install Helm ───────────────────────────────────────────────────────
  - /usr/local/bin/install-helm.sh

  # ── 6. Add Helm repositories ─────────────────────────────────────────────
  - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  - helm repo add bitnami https://charts.bitnami.com/bitnami
  - helm repo update

  # ── 7. Create namespaces ─────────────────────────────────────────────────
  # --dry-run=client -o yaml | apply — idempotent namespace creation
  - k3s kubectl create namespace meridian --dry-run=client -o yaml | k3s kubectl apply -f -
  - k3s kubectl create namespace monitoring --dry-run=client -o yaml | k3s kubectl apply -f -

  # ── 8. Install kube-prometheus-stack ─────────────────────────────────────
  # Grafana admin password is read from SSM at install time — never hardcoded.
  # The EC2 instance profile grants ssm:GetParameter for /meridian/* paths.
  - |
    GRAFANA_PASS=$(aws ssm get-parameter \
      --name "/meridian/grafana/admin-password" \
      --with-decryption \
      --query "Parameter.Value" \
      --output text \
      --region us-west-1)

    helm upgrade --install kube-prometheus-stack \
      prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --version "55.5.1" \
      --set grafana.adminPassword="${GRAFANA_PASS}" \
      --set grafana.service.type=NodePort \
      --set grafana.service.nodePort=30300 \
      --set alertmanager.alertmanagerSpec.replicas=1 \
      --set prometheus.prometheusSpec.retention=7d \
      --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=10Gi \
      --wait \
      --timeout=15m

  # ── 9. Deploy NGINX ingress controller (NodePort — no cloud LB needed) ───
  # NodePort 30080/30443 matches the security group inbound rules in ec2.tf.
  - |
    helm upgrade --install ingress-nginx \
      https://kubernetes.github.io/ingress-nginx \
      --repo https://kubernetes.github.io/ingress-nginx \
      --namespace kube-system \
      --version "4.9.0" \
      --set controller.service.type=NodePort \
      --set controller.service.nodePorts.http=30080 \
      --set controller.service.nodePorts.https=30443 \
      --wait \
      --timeout=5m

final_message: |
  Meridian k3s bootstrap complete at $TIMESTAMP.
  Run `terraform output ssm_session_command` to get a shell on the node.
