#cloud-config
# cloud-init.yaml — First-boot bootstrap for the Meridian k3s single-node cluster.
# Runs once automatically when the EC2 instance starts for the first time.
# Design decisions:
#   - k3s version is pinned (reproducible builds, avoids surprise upgrades)
#   - API server bound to 127.0.0.1 only (never exposed on public interface)
#   - Traefik is disabled — we deploy our own NGINX ingress with explicit config
#   - Helm repos are added so the deploy workflow can `helm upgrade --install` directly
#   - AWS CLI v2 installed for SSM parameter reads at Helm install time
#   - All commands use set -e to abort on any failure (no silent partial installs)

package_update: true
package_upgrade: true

packages:
  - curl
  - jq
  - git
  - unzip
  - nmap-ncat        # provides nc — used for readiness checks (AL2 equivalent of netcat-openbsd)
  - ca-certificates

# Write k3s config before installer runs so the server picks it up on first start
write_files:
  - path: /etc/rancher/k3s/config.yaml
    owner: root:root
    permissions: "0600"
    content: |
      # Port 6443 is blocked by the EC2 security group — no external API access.
      # Do NOT set bind-address/advertise-address to 127.0.0.1: pods reach the
      # API server via the kubernetes ClusterIP service (10.43.0.1→node:6443),
      # and DNAT to loopback from the pod CIDR is rejected by the Linux kernel.

      # Disable built-in ingress and LB — we control these via Helm
      disable:
        - traefik
        - servicelb

      # TLS SANs required for local kubectl without certificate errors
      tls-san:
        - "127.0.0.1"
        - "localhost"

      # Write kubeconfig for root user on install
      write-kubeconfig-mode: "0600"

  # Convenience script: install AWS CLI v2 (idempotent)
  - path: /usr/local/bin/install-awscli.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if command -v aws &>/dev/null; then
        echo "AWS CLI already installed: $(aws --version)"
        exit 0
      fi
      curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
      unzip -q /tmp/awscliv2.zip -d /tmp/awscli-install
      /tmp/awscli-install/aws/install
      rm -rf /tmp/awscliv2.zip /tmp/awscli-install
      echo "AWS CLI installed: $(aws --version)"

  # Convenience script: install Helm (idempotent)
  - path: /usr/local/bin/install-helm.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      if command -v helm &>/dev/null; then
        echo "Helm already installed: $(helm version --short)"
        exit 0
      fi
      # Pinned version — update deliberately, not automatically
      HELM_VERSION="v3.16.3"
      curl -fsSL "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" \
        | tar -xz -C /tmp
      install -o root -g root -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
      rm -rf /tmp/linux-amd64
      echo "Helm installed: $(helm version --short)"

runcmd:
  # ── 1. Install AWS CLI (needed by Helm install step to read SSM secrets) ──
  - /usr/local/bin/install-awscli.sh

  # ── 2. Install k3s — version pinned for reproducibility ───────────────────
  # v1.32.x is the current stable Kubernetes release series (EOL ~2026).
  # Update this value deliberately after testing — k3s minor upgrades can
  # change CRD schemas and require chart updates.
  #
  # SELinux note: k3s-selinux-1.6-1.el7 requires selinux-policy-base >= 3.13.1-252
  # but Amazon Linux 2 ships 3.13.1-192 — the el7 RPM is incompatible. Without the
  # custom SELinux policy, k3s cannot start under enforcing mode. We skip the RPM
  # and set SELinux to permissive; other controls (Cloudflare WAF, Security Groups,
  # SSM-only access) provide equivalent isolation for this single-node cluster.
  - |
    setenforce 0 || true
    sed -i 's/^SELINUX=enforcing/SELINUX=permissive/' /etc/selinux/config
    curl -sfL https://get.k3s.io \
      | INSTALL_K3S_VERSION="v1.32.3+k3s1" \
        INSTALL_K3S_EXEC="server" \
        INSTALL_K3S_SKIP_SELINUX_RPM=true \
        sh -

  # ── 3. Wait for k3s to be ready (API server + CoreDNS) ───────────────────
  - |
    echo "Waiting for k3s node to become Ready..."
    for i in $(seq 1 60); do
      if k3s kubectl get nodes 2>/dev/null | grep -q " Ready"; then
        echo "k3s node is Ready (attempt ${i})"
        break
      fi
      if [ "$i" -eq 60 ]; then
        echo "ERROR: k3s did not become Ready after 10 minutes" >&2
        exit 1
      fi
      echo "  attempt ${i}/60 — sleeping 10s"
      sleep 10
    done

  # ── 4. Copy kubeconfig so root can use kubectl directly ───────────────────
  # Wait for k3s.yaml before copying — it's written by k3s after the API server
  # starts, and may not exist yet even if the installer returned successfully.
  - |
    mkdir -p /root/.kube
    for i in $(seq 1 12); do
      [ -f /etc/rancher/k3s/k3s.yaml ] && break
      echo "  waiting for k3s.yaml — attempt ${i}/12"
      sleep 5
    done
    [ -f /etc/rancher/k3s/k3s.yaml ] || { echo "ERROR: k3s.yaml not found" >&2; exit 1; }
    cp /etc/rancher/k3s/k3s.yaml /root/.kube/config
    chmod 600 /root/.kube/config

  # ── 5. Install Helm ───────────────────────────────────────────────────────
  - /usr/local/bin/install-helm.sh

  # ── 6. Add Helm repositories ─────────────────────────────────────────────
  - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  - helm repo add bitnami https://charts.bitnami.com/bitnami
  - helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  - helm repo update

  # ── 7. Create namespaces ─────────────────────────────────────────────────
  # KUBECONFIG must be set explicitly — cloud-init's runcmd may not have
  # HOME=/root, so ~/.kube/config is not reliably found by kubectl or helm.
  - |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    kubectl create namespace meridian --dry-run=client -o yaml | kubectl apply -f -
    kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

  # ── 8. Install kube-prometheus-stack ─────────────────────────────────────
  # Grafana admin password is read from SSM at install time — never hardcoded.
  # The EC2 instance profile grants ssm:GetParameter for /meridian/* paths.
  # Chart 65.1.0: Prometheus Operator 0.77.x, Grafana 11.x, Alertmanager 0.27.x
  - |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    GRAFANA_PASS=$(aws ssm get-parameter \
      --name "/meridian/grafana/admin-password" \
      --with-decryption \
      --query "Parameter.Value" \
      --output text \
      --region us-west-1)

    helm upgrade --install kube-prometheus-stack \
      prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --version "65.1.0" \
      --set grafana.adminPassword="${GRAFANA_PASS}" \
      --set grafana.service.type=NodePort \
      --set grafana.service.nodePort=30300 \
      --set alertmanager.alertmanagerSpec.replicas=1 \
      --set prometheus.prometheusSpec.retention=7d \
      --set prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage=10Gi \
      --wait \
      --timeout=15m

  # ── 9. Deploy NGINX ingress controller (NodePort — no cloud LB needed) ───
  # hostPort.enabled=true binds the controller pod directly to host ports 80/443.
  # Cloudflare connects to the EC2 public IP on port 80 — hostPort routes it straight
  # to NGINX without any iptables NodePort hop. NodePorts (30080/30443) are kept as
  # fallback for direct-to-node health checks via the security group rules in ec2.tf.
  - |
    export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
    helm upgrade --install ingress-nginx ingress-nginx \
      --repo https://kubernetes.github.io/ingress-nginx \
      --namespace kube-system \
      --version "4.12.0" \
      --set controller.hostPort.enabled=true \
      --set controller.kind=DaemonSet \
      --set controller.service.type=NodePort \
      --set controller.service.nodePorts.http=30080 \
      --set controller.service.nodePorts.https=30443 \
      --wait \
      --timeout=5m

final_message: |
  Meridian k3s bootstrap complete. Node uptime: $UPTIME seconds.
  Run `terraform output ssm_session_command` to get a shell on the node.
